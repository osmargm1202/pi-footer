<header class="page-header">
  <div class="header-shell">
    <div class="logo-box">
      <img src="{{logoSrc}}" alt="{{companyName}}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <div class="logo-placeholder" style="display:none;">{{companyName}}</div>
    </div>
    <div class="header-title">
      <div class="document-title">{{documentTitle}}</div>
      <div class="project-title">{{projectName}} — {{voltage}}</div>
      <div class="project-title">{{location}}</div>
    </div>
    <div class="header-meta">
      <div><strong>Cliente:</strong> {{client}}</div>
      <div><strong>Fecha:</strong> {{date}}</div>
      <div><strong>Revisión:</strong> {{revision}}</div>
      <div><strong>Moneda:</strong> {{currencyBase}}</div>
    </div>
  </div>
</header>
