<section class="indirecto-block" data-block-type="indirectos">
  <h2 class="summary-title">Indirectos</h2>
  <table class="summary-table">
    <thead>
      <tr>
        <th>Concepto</th>
        <th class="text-right">Base</th>
        <th class="text-right">Tipo</th>
        <th class="text-right">Monto</th>
      </tr>
    </thead>
    <tbody>{{rows}}</tbody>
    <tfoot>
      <tr>
        <td colspan="3"><strong>Total indirectos</strong></td>
        <td class="text-right"><strong>{{totalIndirectosFormatted}}</strong></td>
      </tr>
    </tfoot>
  </table>
</section>
