<section class="moneda-alt-block" data-block-type="moneda-alt">
  <h2 class="summary-title">Resumen en moneda alterna</h2>
  <div class="exchange-rate">Tasa de cambio: {{exchangeRate}}</div>
  <table class="summary-table">
    <tbody>
      <tr><td>Subtotal partidas</td><td class="text-right">{{subtotalPartidasAlt}}</td></tr>
      <tr><td>Total indirectos</td><td class="text-right">{{totalIndirectosAlt}}</td></tr>
      <tr><td>Base ITBIS</td><td class="text-right">{{baseItbisAlt}}</td></tr>
      <tr><td>ITBIS {{itbisPercent}}%</td><td class="text-right">{{itbisAlt}}</td></tr>
      <tr class="grand-total-alt"><td>Total general</td><td class="text-right">{{totalGeneralAlt}}</td></tr>
    </tbody>
  </table>
</section>
